name: Sandbox E2E Tests

on:
  workflow_dispatch:
    inputs:
      providers:
        description: 'AI providers to test (comma-separated: openai,gemini,nvidia,openrouter,deepseek)'
        required: false
        default: 'openai'
      scenarios:
        description: 'Test scenarios to run (comma-separated or "all")'
        required: false
        default: 'all'
      timeout:
        description: 'Timeout in minutes'
        required: false
        default: '30'

jobs:
  sandbox:
    runs-on: self-hosted
    timeout-minutes: ${{ fromJSON(github.event.inputs.timeout || '10') }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Build sandbox Docker image
        env:
          SANDBOX_IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --target runtime \
            -t "envcp-sandbox:${SANDBOX_IMAGE_TAG}" \
            -t envcp-sandbox:latest \
            -f __tests__/sandbox/Dockerfile \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
      
      - name: Run sandbox tests
        env:
          SANDBOX_IMAGE_TAG: ${{ github.sha }}
          SANDBOX_RUN_ID: ${{ github.run_id }}
          SANDBOX_PROVIDERS: ${{ github.event.inputs.providers }}
          SANDBOX_SCENARIOS: ${{ github.event.inputs.scenarios }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          docker run --rm \
            --name "envcp-sandbox-run-${SANDBOX_RUN_ID}" \
            --cap-drop=ALL \
            --security-opt="no-new-privileges:true" \
            --pids-limit=256 \
            --memory="2g" \
            --memory-swap="2g" \
            --cpus="2.0" \
            --network bridge \
            -p 127.0.0.1:3456:3456 \
            --tmpfs /tmp/envcp-sandbox:noexec,nosuid,nodev,size=100m,mode=700,uid=10001,gid=10001 \
            --tmpfs /tmp/.npm-cache:noexec,nosuid,nodev,size=50m,mode=700,uid=10001,gid=10001 \
            --tmpfs /tmp/envcp-logs:noexec,nosuid,nodev,size=10m,mode=700,uid=10001,gid=10001 \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            -e GEMINI_API_KEY="$GEMINI_API_KEY" \
            -e NVIDIA_API_KEY="$NVIDIA_API_KEY" \
            -e QWEN_API_KEY="$QWEN_API_KEY" \
            -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            -e DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY" \
            -e SANDBOX_PROVIDERS="$SANDBOX_PROVIDERS" \
            -e SANDBOX_SCENARIOS="$SANDBOX_SCENARIOS" \
            -e GITHUB_SHA="$SANDBOX_IMAGE_TAG" \
            -e GITHUB_RUN_ID="$SANDBOX_RUN_ID" \
            "envcp-sandbox:${SANDBOX_IMAGE_TAG}"
      
      - name: Cleanup Docker images
        if: always()
        env:
          SANDBOX_IMAGE_TAG: ${{ github.sha }}
        run: |
          docker rmi "envcp-sandbox:${SANDBOX_IMAGE_TAG}" 2>/dev/null || true
          docker rmi envcp-sandbox:latest 2>/dev/null || true
          docker image prune -f --filter "until=24h"
      
      - name: Cleanup orphaned containers
        if: always()
        env:
          SANDBOX_RUN_ID: ${{ github.run_id }}
        run: |
          docker ps -a --filter "name=envcp-sandbox-run-${SANDBOX_RUN_ID}" -q | xargs -r docker rm -f
