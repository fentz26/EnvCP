name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e # v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-stale: 60
          days-before-close: 7

          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

          exempt-issue-labels: 'security,Holding,priority:critical'
          exempt-pr-labels: 'security,Holding'
          exempt-all-issue-assignees: true
          exempt-all-pr-assignees: true
          exempt-draft-pr: true

          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 7 days.
            If this is still relevant, leave a comment or remove the `stale` label.
          close-issue-message: >
            Closed due to 67 days of inactivity. Feel free to reopen if still relevant.

          stale-pr-message: >
            This PR has been inactive for 60 days and will be closed in 7 days.
            If still in progress, push a commit or remove the `stale` label.
          close-pr-message: >
            Closed due to 67 days of inactivity. Feel free to reopen when ready.

          operations-per-run: 100
          remove-stale-when-updated: true
          delete-branch: false
