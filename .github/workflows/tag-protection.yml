name: Tag Protection

on:
  delete:
  create:

permissions:
  contents: write

jobs:
  protect-tags:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Prevent tag deletion
        if: github.event_name == 'delete'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::error::Version tags cannot be deleted. Recreate the tag if needed."
          exit 1
