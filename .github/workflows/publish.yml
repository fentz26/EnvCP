name: Publish to npm, PyPI, Docker Hub, and MCP Registry

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'npm dist-tag (latest, beta, experimental, canary)'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - beta
          - experimental
          - canary

permissions:
  contents: write
  packages: write
  id-token: write
  issues: write

jobs:
  determine-channel:
    runs-on: ubuntu-latest
    outputs:
      npm_tag: ${{ steps.channel.outputs.npm_tag }}
      prerelease: ${{ steps.channel.outputs.prerelease }}
    steps:
      - id: channel
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NPM_TAG: ${{ github.event.inputs.npm_tag }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "npm_tag=$INPUT_NPM_TAG" >> "$GITHUB_OUTPUT"
            if [[ "$INPUT_NPM_TAG" != "latest" ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          elif [[ "$TAG" == *"-experimental"* ]] || [[ "$TAG" == *"-exp"* ]]; then
            echo "npm_tag=experimental" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-canary"* ]]; then
            echo "npm_tag=canary" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta ]]; then
            echo "npm_tag=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  publish-npm:
    needs: determine-channel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - name: Sync VERSION and release metadata with git tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '%s\n' "$VERSION" > VERSION
          node scripts/sync-version.js

      - run: npm publish --access=public --tag ${{ needs.determine-channel.outputs.npm_tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Sync VERSION and release metadata with git tag (GitHub Packages)
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '%s\n' "$VERSION" > VERSION
          node scripts/sync-version.js

      - run: npm publish --access=public --tag ${{ needs.determine-channel.outputs.npm_tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: determine-channel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Sync VERSION and release metadata with git tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '%s\n' "$VERSION" > VERSION
          node scripts/sync-version.js

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Python package
        run: |
          cd python
          python -m build

      - name: Upload PyPI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi-dist
          path: python/dist/

      - name: Publish to PyPI
        id: publish_pypi
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: python/dist/

      - name: Verify PyPI publish state
        env:
          EXPECTED_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${EXPECTED_TAG#v}"
          LIVE_VERSION="$(python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          try:
              with urllib.request.urlopen('https://pypi.org/pypi/envcp/json') as response:
                  data = json.load(response)
              print(data['info']['version'])
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  print('')
              else:
                  raise
          PY
          )"

          if [[ "${{ steps.publish_pypi.outcome }}" == "success" ]]; then
            echo "PyPI publish succeeded."
          elif [[ "$LIVE_VERSION" == "$VERSION" ]]; then
            echo "PyPI already has envcp $VERSION; treating release as published."
          else
            echo "PyPI publish failed and envcp $VERSION is not live."
            exit 1
          fi

  publish-docker:
    needs: determine-channel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Sync VERSION and release metadata with git tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '%s\n' "$VERSION" > VERSION
          node scripts/sync-version.js

      - run: npm ci

      - run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Determine Docker tags
        id: dockertags
        run: |
          NPM_TAG="${{ needs.determine-channel.outputs.npm_tag }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ "$NPM_TAG" == "latest" ]]; then
            echo "extra_tags=${{ vars.DOCKERHUB_USERNAME }}/envcp:latest,ghcr.io/fentz26/envcp:latest" >> $GITHUB_OUTPUT
          elif [[ "$NPM_TAG" == "experimental" ]]; then
            echo "extra_tags=${{ vars.DOCKERHUB_USERNAME }}/envcp:experimental,ghcr.io/fentz26/envcp:experimental" >> $GITHUB_OUTPUT
          else
            echo "extra_tags=${{ vars.DOCKERHUB_USERNAME }}/envcp:canary,ghcr.io/fentz26/envcp:canary" >> $GITHUB_OUTPUT
          fi

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/envcp:${{ steps.version.outputs.VERSION }}
            ghcr.io/fentz26/envcp:${{ steps.version.outputs.VERSION }}
            ${{ steps.dockertags.outputs.extra_tags }}

  create-release:
    needs: [determine-channel, publish-npm, publish-pypi, publish-docker]
    if: always() && needs.publish-npm.result == 'success' && needs.publish-docker.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Download PyPI artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pypi-dist
        path: pypi-dist/
      continue-on-error: true

    - name: Rebuild PyPI dist if missing
      if: hashFiles('pypi-dist/*.whl') == ''
      run: |
        python -m pip install --upgrade pip build
        cd python && python -m build
        mkdir -p ../pypi-dist
        cp dist/*.whl dist/*.tar.gz ../pypi-dist/

    - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          FEAT=""
          FIX=""
          SECURITY=""
          PERF=""
          DOCS=""
          CI=""
          DEPS=""
          OTHER=""

          while IFS= read -r line; do
            msg=$(echo "$line" | sed 's/^[a-f0-9]* //')
            if echo "$msg" | grep -qiE '^[a-z]+(\(.+\))?!?:'; then
              type=$(echo "$msg" | sed -E 's/^([a-z]+)(\(.+\))?!?:.*/\1/')
            else
              type="other"
            fi

            pr_num=$(echo "$msg" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            link=""
            if [[ -n "$pr_num" ]]; then
              link=" ([#$pr_num](https://github.com/$GITHUB_REPOSITORY/pull/$pr_num))"
            fi

            case "$type" in
              feat)    FEAT="$FEAT\n- $msg$link" ;;
              fix)     FIX="$FIX\n- $msg$link" ;;
              security|sec) SECURITY="$SECURITY\n- $msg$link" ;;
              perf)    PERF="$PERF\n- $msg$link" ;;
              docs)    DOCS="$DOCS\n- $msg$link" ;;
              ci)      CI="$CI\n- $msg$link" ;;
              deps|dep|build) DEPS="$DEPS\n- $msg$link" ;;
              *)       OTHER="$OTHER\n- $msg$link" ;;
            esac
          done < <(git log $RANGE --pretty=format:"%h %s" --no-merges 2>/dev/null)

          BODY="## What Changed"
          BODY="$BODY\n"
          if [[ -n "$FEAT" ]]; then BODY="$BODY\n### Features$(echo -e "$FEAT")"; fi
          if [[ -n "$FIX" ]]; then BODY="$BODY\n### Fixes$(echo -e "$FIX")"; fi
          if [[ -n "$SECURITY" ]]; then BODY="$BODY\n### Security$(echo -e "$SECURITY")"; fi
          if [[ -n "$PERF" ]]; then BODY="$BODY\n### Performance$(echo -e "$PERF")"; fi
          if [[ -n "$DOCS" ]]; then BODY="$BODY\n### Documentation$(echo -e "$DOCS")"; fi
          if [[ -n "$CI" ]]; then BODY="$BODY\n### CI/CD$(echo -e "$CI")"; fi
          if [[ -n "$DEPS" ]]; then BODY="$BODY\n### Dependencies$(echo -e "$DEPS")"; fi
          if [[ -n "$OTHER" ]]; then BODY="$BODY\n### Other$(echo -e "$OTHER")"; fi

          BODY="$BODY\n\n---\n\n**Full Changelog**: https://github.com/$GITHUB_REPOSITORY/compare/${PREV_TAG:-$TAG}...$TAG"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          SECTION=""
          if [[ -n "$FEAT" ]]; then SECTION="$SECTION\n### Features$(echo -e "$FEAT")"; fi
          if [[ -n "$FIX" ]]; then SECTION="$SECTION\n### Fixes$(echo -e "$FIX")"; fi
          if [[ -n "$SECURITY" ]]; then SECTION="$SECTION\n### Security$(echo -e "$SECURITY")"; fi
          if [[ -n "$PERF" ]]; then SECTION="$SECTION\n### Performance$(echo -e "$PERF")"; fi
          if [[ -n "$DOCS" ]]; then SECTION="$SECTION\n### Documentation$(echo -e "$DOCS")"; fi
          if [[ -n "$CI" ]]; then SECTION="$SECTION\n### CI/CD$(echo -e "$CI")"; fi
          if [[ -n "$DEPS" ]]; then SECTION="$SECTION\n### Dependencies$(echo -e "$DEPS")"; fi
          if [[ -n "$OTHER" ]]; then SECTION="$SECTION\n### Other$(echo -e "$OTHER")"; fi

          echo "section<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE_FLAG=""
          if [[ "${{ needs.determine-channel.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it unchanged."
            exit 0
          fi

          CHANGELOG_FILE=/tmp/changelog_body.md
          echo "${{ steps.changelog.outputs.body }}" > "$CHANGELOG_FILE"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file "$CHANGELOG_FILE" \
            $PRERELEASE_FLAG \
            pypi-dist/*.whl pypi-dist/*.tar.gz

      - name: Update pinned Changelog issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${GITHUB_REF#refs/tags/v}"
          DATE=$(date +%Y-%m-%d)
          NEW_SECTION="## $TAG ($DATE)${{ steps.changelog.outputs.section }}"
          NEW_SECTION="$NEW_SECTION\n\n"

          CURRENT=$(gh issue view 186 --repo "$GITHUB_REPOSITORY" --json body --jq '.body')

          MARKER="## v1.1.0 (2026-04-11)"
          HEADER="# Changelog"
          OVERVIEW="All notable changes to EnvCP. Dates in YYYY-MM-DD format."
          DIVIDER="---"

          BEFORE_MARKER=$(echo "$CURRENT" | awk "/$MARKER/{found=1} !found{print}")
          AFTER_HEADER=$(echo "$CURRENT" | awk "/$DIVIDER/{found=1; next} found")

          UPDATED="$HEADER"
          UPDATED="$UPDATED\n\n$OVERVIEW"
          UPDATED="$UPDATED\n\n$DIVIDER"
          UPDATED="$UPDATED\n\n$(echo -e "$NEW_SECTION")"

          REMAINDER=$(echo "$CURRENT" | sed -n "/## v1\.1\.0/,\$p")
          UPDATED="$UPDATED\n$REMAINDER"

          echo -e "$UPDATED" > /tmp/issue_body.md
          gh issue edit 186 --repo "$GITHUB_REPOSITORY" --body-file /tmp/issue_body.md

  publish-mcp-registry:
    needs: [determine-channel, publish-npm]
    runs-on: ubuntu-latest
    if: needs.determine-channel.outputs.npm_tag == 'latest'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.2.0
          MCP_PUBLISHER_SHA256: 'be2d2be03105b3a89a0a7f305fc62e65f26c60b927cbff1b3a70d2b3654fef5d'
        run: |
          set -euo pipefail
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_${MCP_PUBLISHER_VERSION#v}_${OS}_${ARCH}.tar.gz"
          curl -fsSL --retry 3 --max-time 60 -o mcp-publisher.tgz "$URL"
          if [ -n "$MCP_PUBLISHER_SHA256" ]; then
            echo "$MCP_PUBLISHER_SHA256  mcp-publisher.tgz" | sha256sum -c -
          fi
          tar xzf mcp-publisher.tgz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          rm -f mcp-publisher.tgz

      - name: Sync VERSION and release metadata with git tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '%s\n' "$VERSION" > VERSION
          node scripts/sync-version.js

      - name: Login to MCP Registry
        id: mcp_login
        continue-on-error: true
        env:
          MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: |
          if [ -z "${MCP_REGISTRY_PRIVATE_KEY:-}" ]; then
            echo "MCP_REGISTRY_PRIVATE_KEY is not configured."
            exit 1
          fi
          echo "$MCP_REGISTRY_PRIVATE_KEY" > /tmp/key.pem
          mcp-publisher login dns --domain "envcp.org" --private-key "$(openssl pkey -in /tmp/key.pem -noout -text | grep -A3 'priv:' | tail -n +2 | tr -d ' :\n')"

      - name: Publish to MCP Registry
        id: mcp_publish
        if: steps.mcp_login.outcome == 'success'
        continue-on-error: true
        run: mcp-publisher publish

      - name: Summarize MCP Registry publish status
        if: always()
        run: |
          if [[ "${{ steps.mcp_login.outcome }}" != "success" ]]; then
            echo "::warning::Skipping MCP Registry publish because DNS auth is not ready or MCP credentials are missing."
          elif [[ "${{ steps.mcp_publish.outcome }}" != "success" ]]; then
            echo "::warning::MCP Registry publish failed, but the rest of the release already completed."
          else
            echo "MCP Registry publish succeeded."
          fi
