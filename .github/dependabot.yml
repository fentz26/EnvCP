version: 2
updates:
# npm dependencies
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "09:00"
    timezone: UTC
  open-pull-requests-limit: 10
  commit-message:
    prefix: "deps"
    include: "scope"
  labels:
  - dependencies
  - security
  groups:
    minor-and-patch:
      patterns:
      - "*"
      update-types:
      - minor
      - patch

# GitHub Actions
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "09:00"
    timezone: UTC
  commit-message:
    prefix: "ci"
  labels:
  - dependencies
  - ci

# Rust crates
- package-ecosystem: cargo
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "09:00"
    timezone: UTC
  commit-message:
    prefix: "deps(rust)"
  labels:
  - dependencies
  - security
  ignore:
  - dependency-name: rand
    versions: ["0.9.0", "0.9.1", "0.9.2"]
